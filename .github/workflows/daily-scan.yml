name: Daily Qiuzhao Scan

on:
  schedule:
    # 每天北京时间 8:00 (UTC 0:00) 运行
    - cron: '0 0 * * *'
  # 支持手动触发测试
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run daily scan
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          NOTIFIER_TYPE: ${{ vars.NOTIFIER_TYPE || 'pushplus' }}
        run: python -m qiuzhao.main

      - name: Commit updated database
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/qiuzhao.db
          git diff --staged --quiet || git commit -m "Update qiuzhao database [skip ci]"
          git push

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qiuzhao-logs
          path: logs/
          retention-days: 7
