name: Daily Qiuzhao Scan

on:
  schedule:
    # 每天北京时间 8:00 (UTC 0:00) 运行
    - cron: '0 0 * * *'
  # 支持手动触发测试
  workflow_dispatch:

# 给 GITHUB_TOKEN 写权限，用于提交数据库更新
permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily scan
        env:
          NOTIFIER_TYPES: ${{ secrets.NOTIFIER_TYPES }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '465' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM || secrets.SMTP_USER }}
        run: python -m qiuzhao.main

      - name: Commit updated database
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/qiuzhao.db
          git diff --staged --quiet || git commit -m "Update qiuzhao database [skip ci]"
          git push

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qiuzhao-logs
          path: logs/
          retention-days: 7
